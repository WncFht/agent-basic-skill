interface:
  display_name: "Deep Research"
  short_description: "Multimodal research reports with PDF evidence and citations"
  default_prompt: "Use $deepresearch-skill to turn this question and its sources into an evidence-backed research report with figures, formulas, clickable links, a complete LaTeX file, and a rendered PDF. Start from the bundled report template, choose an explicit `\\reporttheme` that fits the audience, and treat the theme as both a visual and layout choice. When the report should feel more like a finished deliverable than a plain memo, also fill the template's optional packaging metadata such as version, stats lines, watermark, frontispiece, and back-cover fields. For source inventories and comparison tables, prefer the template's `ltablex`/`tabularx` pattern with short fixed-width columns plus adaptive `Y` columns instead of rigid all-`p{...}` layouts. Unless the user asks otherwise, write the full artifact bundle under the user's preferred deepresearch output root using YYYY/MM/DD/<topic-slug>-YYYY-MM-DD/ and keep the report directory basename in <topic-slug>-YYYY-MM-DD form."
