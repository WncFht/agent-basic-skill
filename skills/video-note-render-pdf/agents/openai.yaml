interface:
  display_name: "Video Note Render PDF"
  short_description: "Turn a YouTube or Bilibili lecture into a structured LaTeX/PDF note."
  default_prompt: "Use this skill to drive the unified video-note pipeline for a YouTube or Bilibili video. Resolve the external runtime repo and case workspace first, prefer official subtitles over cookies-based subtitles over ASR fallback, inspect preflight artifacts and recommended_mode before writing, then produce a high-quality Chinese LaTeX course note and compile it with latexmk -xelatex."
